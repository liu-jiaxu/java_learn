<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM操作</title>
    <script src="js/jquery-3.6.4.min.js"></script>

    <style>
        .d1 {
            background: aquamarine;
        }
        .d2 {
            background: gray;
        }
        .d3 {
            background:blue;
        }
    </style>

</head>
<body>

    <!--内容操作-->
    <input id="myinput" type="text" name="username" value="张三" /><br>
    <div id="mydiv"><p><a href="#">标题标签</a></p></div>
    <script>

        $(function(){

            // 1.设置myinput的value="李四"
            $("#myinput").val("李四");
            // 2.获取mydiv的标签体内容
            var html = $("#mydiv").html();
            alert(html);
            // 3.设置并获取mydiv纯文本内容
            $("#mydiv").text("aaa");
            var text = $("#mydiv").text();
            alert(text);

        });

    </script>

    <!--通用属性操作-->
    <ul>
        <li id="bj" name="beijing" xxx="yyy" >北京</li>
            <!--name和xxx都是自定义属性-->
        <li id="tj" name="tianjin">天津</li>
    </ul>
    <input type="checkbox" id="hobby" />
    <script>
        $(function(){

            // 1.获取北京节点的name属性值
            var name = $("#bj").attr("name");
            alert(name);
            // 2.设置北京节点的name属性的值为beijing1234
            $("#bj").attr("name","beijing1234");
            // 3.新增北京节点的discription属性，值为didu
            $("#bj").attr("discription","didu");
            // 4.删除北京节点的xxx属性
            $("#bj").removeAttr("xxx");
            // 5.获得hobby的选中状态
            var tj = $("#hobby").prop("checked"); // checked：选中为true，未选为false
            alert(tj);

        });

    </script>

    <!--对class属性操作-->
    <div id="dd1">d1d1</div>
    <div id="dd2" class="d2">d1d1</div>
    <div id="dd3" class="d3">d1d1</div>
    <button id="btn">按钮</button>
    <script>

        $(function () {

            $("#btn").click(function(){
                // 1.添加class
                $("#dd1").addClass("d1");
                    // $("#dd1").prop("class","d1"); 使用prop方法
                // 2.删除class
                $("#dd2").removeClass("d2");
                // 3.toggleClass切换class
                $("#dd3").toggleClass("d3");
            });

        });

    </script>

</body>
</html>
